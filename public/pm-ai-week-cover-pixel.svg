<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" shape-rendering="crispEdges">
  <defs>
    <style>
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
      @keyframes blink { 0%,90%,100%{opacity:1} 95%{opacity:0} }
      @keyframes sparkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
      .float { animation: float 3s ease-in-out infinite; }
      .blink { animation: blink 4s ease-in-out infinite; }
      .sparkle { animation: sparkle 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background — startup office -->
  <rect width="800" height="450" fill="#f0e6dc"/>

  <!-- Brick wall (back) -->
  <rect x="0" y="0" width="800" height="260" fill="#c49070"/>
  <!-- Brick pattern -->
  <g fill="#b07858" opacity="0.4">
    <rect x="0" y="10" width="40" height="18"/>
    <rect x="44" y="10" width="40" height="18"/>
    <rect x="88" y="10" width="40" height="18"/>
    <rect x="132" y="10" width="40" height="18"/>
    <rect x="22" y="32" width="40" height="18"/>
    <rect x="66" y="32" width="40" height="18"/>
    <rect x="110" y="32" width="40" height="18"/>
    <rect x="0" y="54" width="40" height="18"/>
    <rect x="44" y="54" width="40" height="18"/>
    <rect x="88" y="54" width="40" height="18"/>
    <rect x="132" y="54" width="40" height="18"/>
  </g>

  <!-- ════════ WINDOWS (top left, cityscape) ════════ -->
  <rect x="20" y="16" width="120" height="90" fill="#88b8d0" stroke="#7a4a2e" stroke-width="3"/>
  <line x1="80" y1="16" x2="80" y2="106" stroke="#7a4a2e" stroke-width="2"/>
  <line x1="20" y1="60" x2="140" y2="60" stroke="#7a4a2e" stroke-width="2"/>
  <!-- City silhouette -->
  <rect x="30" y="80" width="10" height="16" fill="#6898b0"/>
  <rect x="44" y="72" width="8" height="24" fill="#6898b0"/>
  <rect x="56" y="76" width="14" height="20" fill="#6898b0"/>
  <rect x="90" y="82" width="8" height="14" fill="#6898b0"/>
  <rect x="102" y="74" width="10" height="22" fill="#6898b0"/>
  <rect x="118" y="80" width="12" height="16" fill="#6898b0"/>
  <!-- Sunset glow -->
  <rect x="20" y="16" width="120" height="30" fill="#d4a870" opacity="0.3"/>

  <!-- ════════ ROCKET MURAL (on wall, center-right) ════════ -->
  <g>
    <!-- Rocket body -->
    <rect x="440" y="40" width="24" height="48" fill="#e8e0e4"/>
    <rect x="436" y="60" width="32" height="12" fill="#e8e0e4"/>
    <rect x="448" y="28" width="8" height="14" fill="#c47080"/>
    <!-- Rocket tip -->
    <rect x="448" y="22" width="8" height="8" fill="#c47080"/>
    <rect x="450" y="18" width="4" height="6" fill="#C4724A"/>
    <!-- Rocket window -->
    <rect x="448" y="46" width="8" height="8" fill="#88b8d0"/>
    <!-- Flames -->
    <rect x="444" y="88" width="6" height="10" fill="#C4724A"/>
    <rect x="454" y="88" width="6" height="10" fill="#C4724A"/>
    <rect x="448" y="94" width="8" height="8" fill="#ffe8a0"/>
    <!-- Stars around rocket -->
    <rect x="420" y="30" width="4" height="4" fill="#ffe8a0"/>
    <rect x="480" y="44" width="3" height="3" fill="#ffe8a0"/>
    <rect x="410" y="70" width="3" height="3" fill="#ffe8a0"/>
    <rect x="490" y="28" width="4" height="4" fill="#ffe8a0"/>
  </g>

  <!-- "CREATE, ITERATE, REPEAT" text on wall -->
  <text x="452" y="118" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#5a3e4b" font-weight="bold">CREATE, ITERATE</text>
  <text x="452" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#5a3e4b" font-weight="bold">REPEAT</text>

  <!-- ════════ PENDANT LIGHTS ════════ -->
  <rect x="250" y="0" width="2" height="40" fill="#5a3e4b"/>
  <rect x="240" y="40" width="24" height="12" fill="#e8d080"/>
  <rect x="244" y="48" width="16" height="4" fill="#ffe8a0" opacity="0.6"/>

  <rect x="550" y="0" width="2" height="36" fill="#5a3e4b"/>
  <rect x="540" y="36" width="24" height="12" fill="#e8d080"/>
  <rect x="544" y="44" width="16" height="4" fill="#ffe8a0" opacity="0.6"/>

  <!-- ════════ WHITEBOARD (right side) ════════ -->
  <rect x="580" y="40" width="200" height="140" fill="white" stroke="#b09888" stroke-width="3"/>
  <!-- Title -->
  <text x="680" y="58" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#5a3e4b" font-weight="bold">Product Roadmap</text>
  <line x1="590" y1="64" x2="770" y2="64" stroke="#d4c4bc" stroke-width="1"/>
  <!-- Mini sticky notes on whiteboard -->
  <rect x="595" y="72" width="32" height="20" fill="#ffe8a0"/>
  <rect x="632" y="72" width="32" height="20" fill="#ffd6e8"/>
  <rect x="669" y="72" width="32" height="20" fill="#d6f0d6"/>
  <rect x="706" y="72" width="32" height="20" fill="#ffe0c0"/>
  <rect x="743" y="72" width="28" height="20" fill="#c8dce8"/>
  <rect x="595" y="98" width="32" height="20" fill="#d6f0d6"/>
  <rect x="632" y="98" width="32" height="20" fill="#ffe8a0"/>
  <rect x="669" y="98" width="32" height="20" fill="#c8dce8"/>
  <rect x="706" y="98" width="32" height="20" fill="#ffd6e8"/>
  <!-- Arrows between notes -->
  <line x1="627" y1="82" x2="632" y2="82" stroke="#5a3e4b" stroke-width="1"/>
  <line x1="664" y1="82" x2="669" y2="82" stroke="#5a3e4b" stroke-width="1"/>
  <line x1="701" y1="82" x2="706" y2="82" stroke="#5a3e4b" stroke-width="1"/>
  <!-- Scribble text on stickies -->
  <rect x="599" y="78" width="20" height="2" fill="#b09888"/>
  <rect x="599" y="83" width="16" height="2" fill="#b09888"/>
  <rect x="636" y="78" width="18" height="2" fill="#b09888"/>
  <rect x="673" y="78" width="22" height="2" fill="#b09888"/>

  <!-- ════════ BACKGROUND COWORKERS ════════ -->
  <!-- Person 1 (standing, far left) -->
  <rect x="160" y="130" width="14" height="14" fill="#f0c8a0"/>
  <rect x="158" y="128" width="18" height="6" fill="#3a3a3a"/>
  <rect x="158" y="144" width="18" height="24" fill="#5a6a8a"/>
  <rect x="162" y="168" width="6" height="16" fill="#3a3a3a"/>
  <rect x="168" y="168" width="6" height="16" fill="#3a3a3a"/>

  <!-- Person 2 (sitting, center-back) -->
  <rect x="340" y="140" width="14" height="14" fill="#f0c8a0"/>
  <rect x="338" y="138" width="18" height="6" fill="#2B1810"/>
  <rect x="338" y="154" width="18" height="20" fill="#88a088"/>

  <!-- Person 3 (standing, center) -->
  <rect x="380" y="126" width="14" height="14" fill="#f0c8a0"/>
  <rect x="378" y="124" width="18" height="6" fill="#5a3e4b"/>
  <rect x="378" y="140" width="18" height="26" fill="#e8e0e4"/>
  <rect x="382" y="166" width="6" height="16" fill="#3a3a3a"/>
  <rect x="388" y="166" width="6" height="16" fill="#3a3a3a"/>

  <!-- Desk surface -->
  <rect x="0" y="260" width="560" height="20" fill="#c49a6e"/>
  <rect x="0" y="260" width="560" height="4" fill="#d4aa7e"/>

  <!-- Desk front -->
  <rect x="0" y="280" width="560" height="170" fill="#a07a50"/>
  <rect x="0" y="280" width="560" height="3" fill="#8a6a40"/>

  <!-- Floor (right side, behind person) -->
  <rect x="560" y="260" width="240" height="190" fill="#d4b48e"/>

  <!-- ════════ MONITOR (on desk) ════════ -->
  <rect x="120" y="140" width="220" height="110" fill="#2B1810" stroke="#1a0e08" stroke-width="3"/>
  <rect x="130" y="148" width="200" height="94" fill="#1a1a2e"/>
  <!-- Monitor stand -->
  <rect x="210" y="250" width="40" height="12" fill="#3d2214"/>
  <rect x="195" y="258" width="70" height="5" fill="#3d2214"/>

  <!-- Dashboard content on monitor -->
  <text x="230" y="160" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#e8e0e4">Product Analytics Dashboard</text>
  <!-- Bar charts -->
  <rect x="142" y="200" width="8" height="30" fill="#7dbf7d"/>
  <rect x="154" y="190" width="8" height="40" fill="#7dbf7d"/>
  <rect x="166" y="210" width="8" height="20" fill="#C4724A"/>
  <rect x="178" y="195" width="8" height="35" fill="#7dbf7d"/>
  <rect x="190" y="205" width="8" height="25" fill="#C4724A"/>
  <!-- Line chart area -->
  <rect x="210" y="170" width="110" height="60" fill="#0d0d1a"/>
  <polyline points="215,220 230,210 245,215 260,195 275,200 290,185 305,190 315,180" fill="none" stroke="#c47080" stroke-width="2"/>
  <polyline points="215,218 230,215 245,220 260,210 275,212 290,205 305,208 315,200" fill="none" stroke="#7dbf7d" stroke-width="1"/>
  <!-- KPI number -->
  <text x="270" y="240" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#7dbf7d" font-weight="bold">45.2M</text>

  <!-- ════════ LAPTOP (on desk, left) ════════ -->
  <rect x="20" y="194" width="90" height="56" fill="#2B1810" stroke="#1a0e08" stroke-width="2"/>
  <rect x="26" y="200" width="78" height="44" fill="#1a1a2e"/>
  <!-- Terminal content -->
  <text x="32" y="210" font-family="'Courier New', monospace" font-size="5" fill="#7dbf7d">$ claude</text>
  <text x="32" y="218" font-family="'Courier New', monospace" font-size="5" fill="#5a7a5a">analyzing event logs...</text>
  <text x="32" y="226" font-family="'Courier New', monospace" font-size="5" fill="#c47080">⚠ duplicate event found</text>
  <text x="32" y="234" font-family="'Courier New', monospace" font-size="5" fill="#5a7a5a">generating report...</text>
  <!-- Laptop base -->
  <rect x="14" y="250" width="102" height="8" fill="#3d2214"/>
  <rect x="14" y="250" width="102" height="2" fill="#5c3320"/>

  <!-- ════════ TABLET (on desk, right of monitor) ════════ -->
  <rect x="370" y="208" width="56" height="44" fill="#2B1810" stroke="#1a0e08" stroke-width="2"/>
  <rect x="374" y="212" width="48" height="36" fill="#e8e0e4"/>
  <!-- Doc content on tablet -->
  <rect x="380" y="218" width="36" height="3" fill="#5a3e4b"/>
  <rect x="380" y="224" width="30" height="2" fill="#b09888"/>
  <rect x="380" y="229" width="34" height="2" fill="#b09888"/>
  <rect x="380" y="234" width="28" height="2" fill="#b09888"/>
  <rect x="380" y="239" width="32" height="2" fill="#b09888"/>

  <!-- ════════ DESK ITEMS ════════ -->
  <!-- Iced coffee -->
  <rect x="350" y="240" width="14" height="22" fill="#d4aa7e" opacity="0.6"/>
  <rect x="350" y="240" width="14" height="22" fill="none" stroke="#b09888" stroke-width="2"/>
  <rect x="352" y="248" width="10" height="10" fill="#6a3a20" opacity="0.7"/>
  <rect x="354" y="238" width="2" height="10" fill="#5a3e4b"/>
  <!-- Straw -->
  <rect x="358" y="230" width="2" height="14" fill="#c47080"/>

  <!-- Coffee cup -->
  <rect x="442" y="248" width="14" height="14" fill="#C4724A"/>
  <rect x="440" y="246" width="18" height="4" fill="#a05a38"/>
  <!-- Steam -->
  <rect x="446" y="238" width="2" height="6" fill="#d4c4bc" opacity="0.3"/>
  <rect x="452" y="236" width="2" height="6" fill="#d4c4bc" opacity="0.2"/>

  <!-- Mini figurines on desk -->
  <!-- Yellow character -->
  <rect x="468" y="250" width="8" height="10" fill="#ffe040"/>
  <rect x="470" y="248" width="4" height="4" fill="#ffe040"/>
  <rect x="471" y="249" width="2" height="2" fill="#2B1810"/>
  <!-- Purple character -->
  <rect x="482" y="252" width="8" height="8" fill="#8a6aaa"/>
  <rect x="484" y="248" width="4" height="6" fill="#8a6aaa"/>
  <rect x="485" y="250" width="2" height="2" fill="#2B1810"/>

  <!-- Notebook -->
  <rect x="500" y="250" width="36" height="14" fill="#ffe8a0"/>
  <rect x="500" y="250" width="36" height="2" fill="#e8d080"/>
  <rect x="506" y="254" width="24" height="2" fill="#d4c4bc"/>
  <rect x="506" y="258" width="20" height="2" fill="#d4c4bc"/>

  <!-- ════════ PLANTS ════════ -->
  <!-- Plant left -->
  <rect x="172" y="120" width="10" height="10" fill="#9a7a6a"/>
  <rect x="174" y="110" width="3" height="12" fill="#4a7040"/>
  <rect x="178" y="106" width="3" height="14" fill="#4a7040"/>
  <rect x="170" y="112" width="3" height="8" fill="#2d4a28"/>

  <!-- Plant right side -->
  <rect x="540" y="240" width="14" height="20" fill="white"/>
  <rect x="544" y="228" width="3" height="14" fill="#4a7040"/>
  <rect x="548" y="224" width="3" height="16" fill="#4a7040"/>
  <rect x="540" y="230" width="3" height="10" fill="#2d4a28"/>
  <rect x="552" y="232" width="3" height="8" fill="#4a7040"/>

  <!-- ════════ MAIN PERSON (right side, sitting, gesturing) ════════ -->
  <g style="transform-origin: 650px 300px" class="float">
    <!-- Head -->
    <rect x="638" y="196" width="28" height="28" fill="#f0c8a0"/>
    <!-- Hair -->
    <rect x="634" y="192" width="36" height="12" fill="#2B1810"/>
    <rect x="634" y="192" width="6" height="24" fill="#2B1810"/>
    <rect x="664" y="192" width="6" height="20" fill="#2B1810"/>
    <!-- Eyes -->
    <g class="blink">
      <rect x="644" y="206" width="4" height="5" fill="#2B1810"/>
      <rect x="656" y="206" width="4" height="5" fill="#2B1810"/>
    </g>
    <!-- Smile -->
    <rect x="648" y="216" width="10" height="2" fill="#2B1810"/>

    <!-- Hoodie body -->
    <rect x="630" y="224" width="44" height="44" fill="#b0b0b0"/>
    <!-- Hoodie hood -->
    <rect x="630" y="218" width="44" height="10" fill="#b0b0b0"/>
    <!-- Hoodie pocket -->
    <rect x="638" y="250" width="28" height="10" fill="#9a9a9a"/>

    <!-- Left arm (gesturing outward) -->
    <rect x="600" y="230" width="30" height="10" fill="#b0b0b0"/>
    <rect x="592" y="226" width="12" height="10" fill="#f0c8a0"/>
    <!-- Fingers spread (gesturing) -->
    <rect x="590" y="224" width="4" height="4" fill="#f0c8a0"/>
    <rect x="594" y="222" width="4" height="4" fill="#f0c8a0"/>
    <rect x="598" y="224" width="4" height="4" fill="#f0c8a0"/>

    <!-- Right arm down -->
    <rect x="674" y="230" width="10" height="26" fill="#b0b0b0"/>
    <rect x="674" y="254" width="10" height="6" fill="#f0c8a0"/>

    <!-- Legs -->
    <rect x="636" y="268" width="14" height="36" fill="#4a5a7a"/>
    <rect x="656" y="268" width="14" height="36" fill="#4a5a7a"/>
    <!-- Shoes -->
    <rect x="634" y="302" width="16" height="6" fill="#3a3a3a"/>
    <rect x="654" y="302" width="16" height="6" fill="#3a3a3a"/>
  </g>

  <!-- Chair -->
  <rect x="620" y="300" width="70" height="8" fill="#C4724A"/>
  <rect x="690" y="260" width="8" height="48" fill="#C4724A"/>
  <rect x="690" y="254" width="8" height="10" fill="#a05a38"/>
  <!-- Chair legs -->
  <rect x="628" y="308" width="4" height="40" fill="#5a3e4b"/>
  <rect x="680" y="308" width="4" height="40" fill="#5a3e4b"/>
  <!-- Chair wheels -->
  <rect x="624" y="346" width="12" height="4" fill="#3a3a3a"/>
  <rect x="676" y="346" width="12" height="4" fill="#3a3a3a"/>

  <!-- Floor line -->
  <rect x="560" y="350" width="240" height="4" fill="#c49a6e"/>

  <!-- Sparkles -->
  <g class="sparkle">
    <rect x="280" y="130" width="4" height="4" fill="#C4724A" opacity="0.4"/>
    <rect x="500" y="180" width="3" height="3" fill="#c47080" opacity="0.5"/>
    <rect x="750" y="310" width="4" height="4" fill="#C4724A" opacity="0.3"/>
  </g>
  <g class="sparkle" style="animation-delay: 1s">
    <rect x="60" y="170" width="3" height="3" fill="#c47080" opacity="0.4"/>
    <rect x="420" y="150" width="3" height="3" fill="#C4724A" opacity="0.3"/>
  </g>
</svg>
