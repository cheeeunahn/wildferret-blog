<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" shape-rendering="crispEdges">
  <defs>
    <style>
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
      @keyframes blink { 0%,90%,100%{opacity:1} 95%{opacity:0} }
      @keyframes sparkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
      @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .float { animation: float 3s ease-in-out infinite; }
      .blink { animation: blink 4s ease-in-out infinite; }
      .sparkle { animation: sparkle 2s ease-in-out infinite; }
      .cursor { animation: cursor-blink 1s step-end infinite; }
    </style>
  </defs>

  <!-- Background — warm office -->
  <rect width="800" height="450" fill="#f5ede6"/>

  <!-- Window (top right) -->
  <rect x="620" y="20" width="160" height="120" fill="#c8dce8" stroke="#b09888" stroke-width="3"/>
  <line x1="700" y1="20" x2="700" y2="140" stroke="#b09888" stroke-width="2"/>
  <line x1="620" y1="80" x2="780" y2="80" stroke="#b09888" stroke-width="2"/>
  <!-- Cityscape silhouette in window -->
  <rect x="640" y="100" width="12" height="20" fill="#9ab0c0"/>
  <rect x="656" y="90" width="8" height="30" fill="#9ab0c0"/>
  <rect x="668" y="95" width="16" height="25" fill="#9ab0c0"/>
  <rect x="690" y="105" width="10" height="15" fill="#9ab0c0"/>
  <rect x="720" y="88" width="10" height="32" fill="#9ab0c0"/>
  <rect x="735" y="95" width="14" height="25" fill="#9ab0c0"/>
  <rect x="755" y="100" width="8" height="20" fill="#9ab0c0"/>
  <!-- Tower (남산타워 hint) -->
  <rect x="724" y="72" width="2" height="16" fill="#9ab0c0"/>
  <rect x="722" y="68" width="6" height="6" fill="#9ab0c0"/>

  <!-- Wall -->
  <rect x="0" y="0" width="800" height="280" fill="#f0e6dc"/>

  <!-- Desk surface -->
  <rect x="0" y="280" width="800" height="24" fill="#7a4a2e"/>
  <rect x="0" y="280" width="800" height="4" fill="#9a6a4e"/>

  <!-- Desk front -->
  <rect x="0" y="304" width="800" height="146" fill="#5c3320"/>
  <rect x="0" y="304" width="800" height="4" fill="#4a2818"/>

  <!-- ════════ MONITOR (center-left) ════════ -->
  <rect x="140" y="60" width="340" height="200" fill="#2B1810" stroke="#1a0e08" stroke-width="3"/>
  <!-- Screen -->
  <rect x="150" y="70" width="320" height="180" fill="#1a1a2e"/>
  <!-- Monitor stand -->
  <rect x="290" y="260" width="40" height="20" fill="#3d2214"/>
  <rect x="270" y="276" width="80" height="6" fill="#3d2214"/>

  <!-- Screen content: Agent Teams diagram -->
  <!-- Title -->
  <text x="310" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#e8e0e4">AI Agent Teams &amp; Claude Peers</text>

  <!-- Agent team circle (3 agents) -->
  <!-- Agent 1 (top) - mini Claude -->
  <rect x="290" y="102" width="16" height="12" fill="#C4724A"/>
  <rect x="293" y="105" width="3" height="3" fill="#1a1a2e"/>
  <rect x="300" y="105" width="3" height="3" fill="#1a1a2e"/>
  <text x="298" y="124" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#7dbf7d">Writer</text>

  <!-- Agent 2 (bottom-left) -->
  <rect x="256" y="132" width="16" height="12" fill="#C4724A"/>
  <rect x="259" y="135" width="3" height="3" fill="#1a1a2e"/>
  <rect x="266" y="135" width="3" height="3" fill="#1a1a2e"/>
  <text x="264" y="154" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#7dbf7d">Analyst</text>

  <!-- Agent 3 (bottom-right) -->
  <rect x="322" y="132" width="16" height="12" fill="#C4724A"/>
  <rect x="325" y="135" width="3" height="3" fill="#1a1a2e"/>
  <rect x="332" y="135" width="3" height="3" fill="#1a1a2e"/>
  <text x="330" y="154" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#7dbf7d">Reviewer</text>

  <!-- Arrows between agents (circular) -->
  <g fill="none" stroke="#5a5a7a" stroke-width="1">
    <line x1="286" y1="116" x2="272" y2="132"/>
    <line x1="308" y1="116" x2="322" y2="132"/>
    <line x1="272" y1="140" x2="322" y2="140"/>
  </g>

  <!-- Divider line -->
  <line x1="370" y1="95" x2="370" y2="230" stroke="#3a3a5a" stroke-width="1"/>

  <!-- Claude Peers (right side of screen) -->
  <text x="420" y="106" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#c47080">Claude Peers</text>

  <!-- Peer 1 -->
  <rect x="394" y="114" width="12" height="10" fill="#C4724A"/>
  <rect x="396" y="117" width="2" height="2" fill="#1a1a2e"/>
  <rect x="402" y="117" width="2" height="2" fill="#1a1a2e"/>
  <!-- Peer 2 -->
  <rect x="430" y="114" width="12" height="10" fill="#C4724A"/>
  <rect x="432" y="117" width="2" height="2" fill="#1a1a2e"/>
  <rect x="438" y="117" width="2" height="2" fill="#1a1a2e"/>
  <!-- Peer 3 -->
  <rect x="412" y="138" width="12" height="10" fill="#C4724A"/>
  <rect x="414" y="141" width="2" height="2" fill="#1a1a2e"/>
  <rect x="420" y="141" width="2" height="2" fill="#1a1a2e"/>

  <!-- Connection lines between peers -->
  <line x1="406" y1="120" x2="430" y2="120" stroke="#5a5a7a" stroke-width="1"/>
  <line x1="406" y1="124" x2="418" y2="138" stroke="#5a5a7a" stroke-width="1"/>
  <line x1="436" y1="124" x2="424" y2="138" stroke="#5a5a7a" stroke-width="1"/>

  <!-- Terminal text at bottom of screen -->
  <rect x="155" y="170" width="310" height="74" fill="#0d0d1a"/>
  <text x="162" y="182" font-family="'Courier New', monospace" font-size="6" fill="#7dbf7d">$ claude /team start</text>
  <text x="162" y="192" font-family="'Courier New', monospace" font-size="6" fill="#5a7a5a">spawning analyst...</text>
  <text x="162" y="202" font-family="'Courier New', monospace" font-size="6" fill="#5a7a5a">spawning reviewer...</text>
  <text x="162" y="212" font-family="'Courier New', monospace" font-size="6" fill="#7dbf7d">✓ 3 agents running</text>
  <text x="162" y="226" font-family="'Courier New', monospace" font-size="6" fill="#5a7a5a">analyzing VOC data...</text>
  <text x="162" y="236" font-family="'Courier New', monospace" font-size="6" fill="#c47080">█</text>

  <!-- ════════ STICKY NOTES (on wall, left of monitor) ════════ -->
  <!-- Note 1 -->
  <rect x="30" y="80" width="52" height="40" fill="#ffe8a0"/>
  <rect x="30" y="80" width="52" height="4" fill="#e8d080"/>
  <text x="56" y="98" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#5a3e4b">Agent</text>
  <text x="56" y="108" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#5a3e4b">Teams</text>

  <!-- Note 2 -->
  <rect x="90" y="68" width="44" height="36" fill="#ffe0c0"/>
  <rect x="90" y="68" width="44" height="4" fill="#e8c8a0"/>
  <text x="112" y="86" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#5a3e4b">Claude</text>
  <text x="112" y="96" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#5a3e4b">Peers</text>

  <!-- Note 3 -->
  <rect x="50" y="136" width="48" height="36" fill="#ffd6e8"/>
  <rect x="50" y="136" width="48" height="4" fill="#e8b8c8"/>
  <text x="74" y="154" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#5a3e4b">VOC</text>
  <text x="74" y="164" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#5a3e4b">Report</text>

  <!-- Note 4 -->
  <rect x="28" y="188" width="50" height="36" fill="#d6f0d6"/>
  <rect x="28" y="188" width="50" height="4" fill="#b8d8b8"/>
  <text x="53" y="206" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#5a3e4b">Roles &amp;</text>
  <text x="53" y="216" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#5a3e4b">Rules</text>

  <!-- ════════ LAPTOP (on desk, right of monitor) ════════ -->
  <!-- Laptop screen -->
  <rect x="520" y="186" width="120" height="76" fill="#2B1810" stroke="#1a0e08" stroke-width="2"/>
  <rect x="526" y="192" width="108" height="64" fill="#1a1a2e"/>
  <!-- Code lines -->
  <rect x="532" y="198" width="40" height="3" fill="#7dbf7d"/>
  <rect x="532" y="206" width="60" height="3" fill="#5a7a5a"/>
  <rect x="540" y="214" width="50" height="3" fill="#5a7a5a"/>
  <rect x="540" y="222" width="44" height="3" fill="#c47080"/>
  <rect x="532" y="230" width="56" height="3" fill="#5a7a5a"/>
  <rect x="540" y="238" width="36" height="3" fill="#7dbf7d"/>
  <rect x="532" y="246" width="48" height="3" fill="#5a7a5a"/>
  <!-- Laptop base -->
  <rect x="510" y="262" width="140" height="12" fill="#3d2214"/>
  <rect x="510" y="262" width="140" height="3" fill="#5c3320"/>

  <!-- ════════ PERSON (right side, pointing at screen) ════════ -->
  <g style="transform-origin: 690px 230px" class="float">
    <!-- Head -->
    <rect x="680" y="164" width="24" height="24" fill="#f0c8a0"/>
    <!-- Hair (bun style like the original photo) -->
    <rect x="676" y="160" width="32" height="10" fill="#2B1810"/>
    <rect x="676" y="160" width="6" height="20" fill="#2B1810"/>
    <rect x="702" y="160" width="6" height="8" fill="#2B1810"/>
    <!-- Hair bun -->
    <rect x="704" y="154" width="10" height="10" fill="#2B1810"/>
    <!-- Eyes -->
    <g class="blink">
      <rect x="686" y="172" width="4" height="4" fill="#2B1810"/>
      <rect x="696" y="172" width="4" height="4" fill="#2B1810"/>
    </g>
    <!-- Smile -->
    <rect x="690" y="180" width="8" height="2" fill="#2B1810"/>

    <!-- Body (dark top like original) -->
    <rect x="676" y="188" width="32" height="36" fill="#3a3a3a"/>
    <!-- Arm pointing left (at screen) -->
    <rect x="636" y="192" width="40" height="8" fill="#3a3a3a"/>
    <rect x="628" y="192" width="10" height="8" fill="#f0c8a0"/>
    <!-- Other arm down -->
    <rect x="708" y="192" width="8" height="28" fill="#3a3a3a"/>
    <rect x="708" y="218" width="8" height="6" fill="#f0c8a0"/>

    <!-- Watch on pointing arm -->
    <rect x="640" y="190" width="8" height="12" fill="#5a3e4b"/>
    <rect x="642" y="192" width="4" height="8" fill="#4a90a0"/>

    <!-- Legs/skirt -->
    <rect x="678" y="224" width="28" height="20" fill="#3a3a3a"/>
    <rect x="682" y="244" width="8" height="30" fill="#3a3a3a"/>
    <rect x="694" y="244" width="8" height="30" fill="#3a3a3a"/>
  </g>

  <!-- ════════ COFFEE CUP on desk ════════ -->
  <rect x="560" y="268" width="16" height="14" fill="#C4724A"/>
  <rect x="558" y="266" width="20" height="4" fill="#a05a38"/>
  <!-- Steam -->
  <rect x="564" y="258" width="2" height="6" fill="#d4c4bc" opacity="0.4"/>
  <rect x="570" y="256" width="2" height="6" fill="#d4c4bc" opacity="0.3"/>

  <!-- ════════ PLANT on desk ════════ -->
  <rect x="508" y="268" width="16" height="14" fill="#9a7a6a"/>
  <rect x="510" y="260" width="4" height="10" fill="#4a7040"/>
  <rect x="516" y="256" width="4" height="14" fill="#4a7040"/>
  <rect x="506" y="258" width="4" height="8" fill="#2d4a28"/>
  <rect x="520" y="262" width="4" height="6" fill="#4a7040"/>

  <!-- Sparkles -->
  <g class="sparkle">
    <rect x="500" y="100" width="4" height="4" fill="#C4724A" opacity="0.4"/>
    <rect x="540" y="150" width="3" height="3" fill="#c47080" opacity="0.5"/>
    <rect x="760" y="280" width="4" height="4" fill="#C4724A" opacity="0.3"/>
  </g>
  <g class="sparkle" style="animation-delay: 1s">
    <rect x="120" y="250" width="3" height="3" fill="#c47080" opacity="0.4"/>
    <rect x="750" y="200" width="3" height="3" fill="#C4724A" opacity="0.3"/>
  </g>
</svg>
