<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" shape-rendering="crispEdges">
  <defs>
    <style>
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
      @keyframes blink { 0%,90%,100%{opacity:1} 95%{opacity:0} }
      @keyframes sparkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
      .float { animation: float 3s ease-in-out infinite; }
      .blink { animation: blink 4s ease-in-out infinite; }
      .sparkle { animation: sparkle 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#f0e6dc"/>

  <!-- Desk surface -->
  <rect x="0" y="280" width="800" height="16" fill="#c49a6e"/>
  <rect x="0" y="280" width="800" height="4" fill="#d4aa7e"/>
  <!-- Desk front -->
  <rect x="0" y="296" width="800" height="104" fill="#a07a50"/>
  <rect x="0" y="296" width="800" height="3" fill="#8a6a40"/>

  <!-- ════════ PERSON (center, large, behind desk) ════════ -->
  <g style="transform-origin: 400px 200px" class="float">
    <!-- Head -->
    <rect x="378" y="80" width="44" height="44" fill="#f0c8a0"/>
    <!-- Hair -->
    <rect x="372" y="72" width="56" height="18" fill="#2B1810"/>
    <rect x="372" y="72" width="10" height="40" fill="#2B1810"/>
    <rect x="418" y="72" width="10" height="44" fill="#2B1810"/>
    <!-- Hair bun -->
    <rect x="424" y="64" width="14" height="14" fill="#2B1810"/>
    <!-- Eyes -->
    <g class="blink">
      <rect x="388" y="96" width="8" height="8" fill="#2B1810"/>
      <rect x="406" y="96" width="8" height="8" fill="#2B1810"/>
    </g>
    <!-- Smile -->
    <rect x="394" y="112" width="16" height="3" fill="#2B1810"/>

    <!-- Body -->
    <rect x="366" y="124" width="68" height="70" fill="#3a3a3a"/>

    <!-- Left arm (reaching to laptop) -->
    <rect x="300" y="200" width="66" height="14" fill="#3a3a3a"/>
    <rect x="286" y="202" width="18" height="10" fill="#f0c8a0"/>

    <!-- Right arm (reaching to keyboard) -->
    <rect x="434" y="200" width="60" height="14" fill="#3a3a3a"/>
    <rect x="490" y="202" width="18" height="10" fill="#f0c8a0"/>

    <!-- Watch on right arm -->
    <rect x="486" y="200" width="8" height="14" fill="#5a3e4b"/>
    <rect x="488" y="202" width="4" height="10" fill="#4a90a0"/>

    <!-- Legs (behind desk, barely visible) -->
    <rect x="376" y="194" width="16" height="86" fill="#4a5a7a"/>
    <rect x="408" y="194" width="16" height="86" fill="#4a5a7a"/>
  </g>

  <!-- ════════ LAPTOP (left on desk) ════════ -->
  <rect x="120" y="216" width="140" height="68" fill="#2B1810" stroke="#1a0e08" stroke-width="2"/>
  <rect x="128" y="222" width="124" height="56" fill="#1a1a2e"/>
  <rect x="110" y="284" width="160" height="6" fill="#b0b0b0"/>
  <!-- Terminal content -->
  <text x="136" y="236" font-family="'Courier New', monospace" font-size="6" fill="#7dbf7d">$ claude</text>
  <text x="136" y="248" font-family="'Courier New', monospace" font-size="6" fill="#5a7a5a">building landing page...</text>
  <text x="136" y="260" font-family="'Courier New', monospace" font-size="6" fill="#7dbf7d">✓ components ready</text>
  <text x="136" y="272" font-family="'Courier New', monospace" font-size="6" fill="#7dbf7d">✓ deployed</text>

  <!-- ════════ MONITOR (right on desk) ════════ -->
  <rect x="500" y="120" width="200" height="130" fill="#2B1810" stroke="#1a0e08" stroke-width="3"/>
  <rect x="510" y="128" width="180" height="114" fill="#1a1a2e"/>
  <!-- Monitor stand -->
  <rect x="580" y="250" width="40" height="12" fill="#3d2214"/>
  <rect x="566" y="260" width="68" height="6" fill="#3d2214"/>
  <!-- Simple screen content — code/dashboard -->
  <text x="520" y="142" font-family="'Courier New', monospace" font-size="6" fill="#7dbf7d">analytics dashboard</text>
  <!-- Bar chart -->
  <rect x="524" y="160" width="8" height="30" fill="#7a6aaa"/>
  <rect x="538" y="150" width="8" height="40" fill="#7a6aaa"/>
  <rect x="552" y="166" width="8" height="24" fill="#C4724A"/>
  <rect x="566" y="154" width="8" height="36" fill="#7a6aaa"/>
  <rect x="580" y="162" width="8" height="28" fill="#C4724A"/>
  <rect x="594" y="148" width="8" height="42" fill="#7a6aaa"/>
  <!-- Line chart -->
  <rect x="620" y="155" width="60" height="40" fill="#0d0d1a"/>
  <polyline points="625,190 635,182 645,186 655,172 665,176 675,168" fill="none" stroke="#c47080" stroke-width="2"/>
  <!-- Numbers -->
  <text x="650" y="210" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#7dbf7d">45.2M</text>
  <text x="560" y="230" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#5a7a5a">conversion ↑ 12%</text>

  <!-- ════════ STICKY NOTES (on wall) ════════ -->
  <rect x="720" y="80" width="44" height="32" fill="#ffe8a0"/>
  <rect x="720" y="80" width="44" height="3" fill="#e8d080"/>
  <text x="742" y="98" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#5a3e4b">Product</text>
  <text x="742" y="108" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#5a3e4b">Roadmap</text>

  <rect x="730" y="120" width="44" height="32" fill="#ffd6e8"/>
  <rect x="730" y="120" width="44" height="3" fill="#e8b8c8"/>
  <text x="752" y="138" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#5a3e4b">VOC</text>
  <text x="752" y="148" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#5a3e4b">Analysis</text>

  <!-- Coffee cup on desk -->
  <rect x="460" y="264" width="16" height="16" fill="#e8e0d8" stroke="#b09888" stroke-width="2"/>
  <rect x="462" y="260" width="12" height="6" fill="#C4724A"/>
  <rect x="466" y="254" width="2" height="6" fill="#d4c4bc" opacity="0.3"/>

  <!-- Sparkles -->
  <g class="sparkle">
    <rect x="340" y="60" width="3" height="3" fill="#C4724A" opacity="0.4"/>
    <rect x="500" y="100" width="3" height="3" fill="#c47080" opacity="0.5"/>
    <rect x="150" y="180" width="3" height="3" fill="#C4724A" opacity="0.3"/>
  </g>
</svg>
