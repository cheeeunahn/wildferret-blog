<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" shape-rendering="crispEdges">
  <defs>
    <style>
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
      @keyframes blink { 0%,90%,100%{opacity:1} 95%{opacity:0} }
      @keyframes sparkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
      .float { animation: float 3s ease-in-out infinite; }
      .blink { animation: blink 4s ease-in-out infinite; }
      .sparkle { animation: sparkle 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#fff5f7"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="280" y1="0" x2="280" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="440" y1="0" x2="440" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="520" y1="0" x2="520" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="560" y1="0" x2="560" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="680" y1="0" x2="680" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="760" y1="0" x2="760" y2="400" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="0" y1="40" x2="800" y2="40" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="0" y1="280" x2="800" y2="280" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#5a3e4b" stroke-width="1"/>
    <line x1="0" y1="360" x2="800" y2="360" stroke="#5a3e4b" stroke-width="1"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="320" width="800" height="80" fill="#3d2214"/>
  <rect x="0" y="320" width="800" height="12" fill="#5c3320"/>
  <rect x="0" y="320" width="800" height="4" fill="#7a4a2e"/>

  <!-- Grass tufts -->
  <g fill="#4a7040">
    <rect x="40" y="308" width="4" height="12"/>
    <rect x="44" y="304" width="4" height="16"/>
    <rect x="48" y="308" width="4" height="12" fill="#2d4a28"/>
    <rect x="180" y="310" width="4" height="10"/>
    <rect x="184" y="306" width="4" height="14"/>
    <rect x="188" y="310" width="4" height="10" fill="#2d4a28"/>
    <rect x="620" y="308" width="4" height="12"/>
    <rect x="624" y="304" width="4" height="16"/>
    <rect x="628" y="308" width="4" height="12" fill="#2d4a28"/>
    <rect x="740" y="310" width="4" height="10"/>
    <rect x="744" y="306" width="4" height="14"/>
    <rect x="748" y="310" width="4" height="10" fill="#2d4a28"/>
  </g>

  <!-- Small flower -->
  <g>
    <rect x="140" y="306" width="4" height="14" fill="#4a7040"/>
    <rect x="136" y="302" width="12" height="4" fill="#c47080"/>
    <rect x="140" y="298" width="4" height="4" fill="#c47080"/>
    <rect x="140" y="306" width="4" height="4" fill="#c47080"/>
  </g>

  <!-- Pebbles -->
  <rect x="680" y="314" width="16" height="6" fill="#5a4a40"/>
  <rect x="682" y="312" width="12" height="2" fill="#9a7a6a"/>

  <!-- ════════ CENTER: Claude character (normal mood) ════════ -->
  <!-- Character centered at x=400, y=160. Body is 96x64, arms 12x18, legs 10x18 -->
  <g class="float" style="transform-origin: 400px 180px">
    <!-- Body -->
    <rect x="352" y="130" width="96" height="64" fill="#C4724A"/>
    <!-- Arms -->
    <rect x="340" y="148" width="12" height="18" fill="#C4724A"/>
    <rect x="448" y="148" width="12" height="18" fill="#C4724A"/>
    <!-- Legs -->
    <rect x="360" y="194" width="10" height="18" fill="#C4724A"/>
    <rect x="376" y="194" width="10" height="18" fill="#C4724A"/>
    <rect x="414" y="194" width="10" height="18" fill="#C4724A"/>
    <rect x="430" y="194" width="10" height="18" fill="#C4724A"/>
    <!-- Normal eyes (rectangles) -->
    <g class="blink">
      <rect x="372" y="148" width="8" height="10" fill="#2B1810"/>
      <rect x="420" y="148" width="8" height="10" fill="#2B1810"/>
    </g>

    <!-- Speech bubble -->
    <rect x="430" y="90" width="100" height="36" rx="0" fill="white" stroke="#5a3e4b" stroke-width="2"/>
    <rect x="438" y="126" width="6" height="6" fill="white"/>
    <rect x="440" y="130" width="3" height="3" fill="#5a3e4b"/>
    <text x="480" y="106" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#5a3e4b">you got</text>
    <text x="480" y="119" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#5a3e4b">this! ♡</text>
  </g>

  <!-- Sparkles scattered -->
  <g class="sparkle">
    <rect x="80" y="100" width="4" height="4" fill="#C4724A" opacity="0.5"/>
    <rect x="300" y="80" width="3" height="3" fill="#c47080"/>
    <rect x="520" y="110" width="4" height="4" fill="#C4724A" opacity="0.4"/>
    <rect x="700" y="90" width="3" height="3" fill="#c47080"/>
    <rect x="200" y="280" width="3" height="3" fill="#C4724A" opacity="0.3"/>
    <rect x="560" y="270" width="4" height="4" fill="#c47080" opacity="0.4"/>
  </g>
  <g class="sparkle" style="animation-delay: 1s">
    <rect x="160" y="180" width="3" height="3" fill="#c47080" opacity="0.4"/>
    <rect x="650" y="200" width="3" height="3" fill="#C4724A" opacity="0.3"/>
    <rect x="400" y="290" width="4" height="4" fill="#c47080" opacity="0.5"/>
  </g>

</svg>
