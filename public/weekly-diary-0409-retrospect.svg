<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" shape-rendering="crispEdges">
  <defs>
    <style>
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
      @keyframes blink { 0%,90%,100%{opacity:1} 95%{opacity:0} }
      @keyframes sparkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
      .float { animation: float 3s ease-in-out infinite; }
      .blink { animation: blink 4s ease-in-out infinite; }
      .sparkle { animation: sparkle 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="#fff5f7"/>

  <!-- Ground -->
  <rect x="0" y="240" width="800" height="60" fill="#3d2214"/>
  <rect x="0" y="240" width="800" height="10" fill="#5c3320"/>
  <rect x="0" y="240" width="800" height="3" fill="#7a4a2e"/>

  <!-- ════════ LEFT SIDE: "해볼까?" — person standing alone, tall wall ahead ════════ -->

  <!-- Tall wall/barrier -->
  <rect x="280" y="160" width="20" height="80" fill="#9a7a6a"/>
  <rect x="280" y="160" width="20" height="4" fill="#b09888"/>
  <rect x="282" y="168" width="4" height="4" fill="#806858"/>
  <rect x="290" y="176" width="4" height="4" fill="#806858"/>
  <rect x="284" y="190" width="4" height="4" fill="#806858"/>
  <rect x="292" y="200" width="4" height="4" fill="#806858"/>
  <rect x="282" y="214" width="4" height="4" fill="#806858"/>

  <!-- Person (left side, looking at wall) -->
  <g style="transform-origin: 200px 210px" class="float">
    <!-- Head -->
    <rect x="192" y="186" width="16" height="16" fill="#f0c8a0"/>
    <!-- Hair -->
    <rect x="190" y="184" width="20" height="6" fill="#2B1810"/>
    <rect x="190" y="184" width="4" height="12" fill="#2B1810"/>
    <!-- Eye -->
    <rect x="200" y="192" width="4" height="4" fill="#2B1810"/>
    <!-- Body -->
    <rect x="190" y="202" width="20" height="20" fill="#5a3e4b"/>
    <!-- Legs -->
    <rect x="192" y="222" width="6" height="18" fill="#5a3e4b"/>
    <rect x="202" y="222" width="6" height="18" fill="#5a3e4b"/>
    <!-- Arms -->
    <rect x="184" y="204" width="6" height="14" fill="#f0c8a0"/>
    <rect x="210" y="204" width="6" height="14" fill="#f0c8a0"/>
  </g>

  <!-- "?" thought bubble -->
  <rect x="216" y="164" width="36" height="20" fill="white" stroke="#5a3e4b" stroke-width="2"/>
  <rect x="218" y="184" width="4" height="4" fill="white"/>
  <rect x="214" y="186" width="4" height="3" fill="#5a3e4b"/>
  <text x="234" y="178" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#5a3e4b" font-weight="bold">. . .</text>

  <!-- Label "해볼까?" -->
  <text x="200" y="270" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#7a4a2e">해볼까?</text>

  <!-- ════════ CENTER: Arrow / transition ════════ -->
  <g fill="#d4c4bc">
    <rect x="360" y="196" width="80" height="4"/>
    <!-- arrowhead -->
    <rect x="432" y="190" width="4" height="16"/>
    <rect x="436" y="194" width="4" height="8"/>
    <rect x="440" y="196" width="4" height="4"/>
  </g>

  <!-- ════════ RIGHT SIDE: "해보자" — person + Claude walking together, wall is low/broken ════════ -->

  <!-- Low broken wall (crumbled) -->
  <rect x="480" y="226" width="16" height="14" fill="#9a7a6a"/>
  <rect x="480" y="226" width="16" height="3" fill="#b09888"/>
  <!-- Rubble pieces -->
  <rect x="498" y="234" width="6" height="6" fill="#9a7a6a"/>
  <rect x="474" y="236" width="4" height="4" fill="#9a7a6a"/>
  <rect x="502" y="238" width="4" height="3" fill="#b09888"/>

  <!-- Person (right side, walking forward confidently) -->
  <g style="transform-origin: 560px 210px" class="float">
    <!-- Head -->
    <rect x="552" y="186" width="16" height="16" fill="#f0c8a0"/>
    <!-- Hair -->
    <rect x="550" y="184" width="20" height="6" fill="#2B1810"/>
    <rect x="550" y="184" width="4" height="12" fill="#2B1810"/>
    <!-- Eye (happy, closed) -->
    <rect x="560" y="193" width="6" height="2" fill="#2B1810"/>
    <!-- Body -->
    <rect x="550" y="202" width="20" height="20" fill="#C4724A"/>
    <!-- Legs (walking pose) -->
    <rect x="552" y="222" width="6" height="18" fill="#5a3e4b"/>
    <rect x="560" y="222" width="6" height="18" fill="#5a3e4b"/>
    <!-- Arms -->
    <rect x="544" y="204" width="6" height="14" fill="#f0c8a0"/>
    <rect x="570" y="206" width="6" height="10" fill="#f0c8a0"/>
  </g>

  <!-- Small Claude pet following along -->
  <g style="transform-origin: 620px 224px; animation-delay: 0.3s" class="float">
    <!-- Body -->
    <rect x="606" y="214" width="28" height="18" fill="#C4724A"/>
    <!-- Legs -->
    <rect x="610" y="232" width="4" height="8" fill="#C4724A"/>
    <rect x="616" y="232" width="4" height="8" fill="#C4724A"/>
    <rect x="622" y="232" width="4" height="8" fill="#C4724A"/>
    <rect x="628" y="232" width="4" height="8" fill="#C4724A"/>
    <!-- Eyes -->
    <g class="blink">
      <rect x="612" y="219" width="4" height="5" fill="#2B1810"/>
      <rect x="624" y="219" width="4" height="5" fill="#2B1810"/>
    </g>
  </g>

  <!-- Small heart between them -->
  <rect x="586" y="196" width="4" height="4" fill="#c47080" class="sparkle"/>
  <rect x="582" y="192" width="4" height="4" fill="#c47080" class="sparkle"/>
  <rect x="590" y="192" width="4" height="4" fill="#c47080" class="sparkle"/>
  <rect x="584" y="188" width="4" height="4" fill="#c47080" class="sparkle"/>
  <rect x="588" y="188" width="4" height="4" fill="#c47080" class="sparkle"/>

  <!-- Label "해보자" -->
  <text x="590" y="270" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#7a4a2e">해보자!</text>

  <!-- Sparkles on right side -->
  <g class="sparkle">
    <rect x="520" y="170" width="3" height="3" fill="#C4724A" opacity="0.5"/>
    <rect x="660" y="180" width="3" height="3" fill="#c47080" opacity="0.4"/>
    <rect x="700" y="200" width="3" height="3" fill="#C4724A" opacity="0.3"/>
  </g>
  <g class="sparkle" style="animation-delay: 1s">
    <rect x="640" y="160" width="3" height="3" fill="#c47080" opacity="0.4"/>
    <rect x="540" y="200" width="3" height="3" fill="#C4724A" opacity="0.3"/>
  </g>

  <!-- Grass tufts on ground -->
  <g fill="#4a7040">
    <rect x="100" y="232" width="4" height="8"/>
    <rect x="104" y="228" width="4" height="12"/>
    <rect x="108" y="232" width="4" height="8" fill="#2d4a28"/>
    <rect x="380" y="234" width="4" height="6"/>
    <rect x="384" y="230" width="4" height="10"/>
    <rect x="680" y="232" width="4" height="8"/>
    <rect x="684" y="228" width="4" height="12"/>
    <rect x="688" y="232" width="4" height="8" fill="#2d4a28"/>
  </g>
</svg>
